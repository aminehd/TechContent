<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>vizalgo</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>

  <div id="header">
    <h1 id="prob-title">Loading...</h1>
    <span class="badge badge-medium">Medium</span>
    <span class="badge badge-tag" id="badge1">BFS</span>
    <span class="badge badge-tag" id="badge2">Grid</span>
    <span id="desc-bar"></span>
  </div>

  <div id="main">

    <div id="viz-panel">
      <span id="viz-label">GRID</span>
      <div id="pixi-container"></div>
      <svg id="graph-svg" style="display:none"></svg>
      <div id="crt-overlay"></div>
    </div>

    <div id="right">
      <div id="code-panel">
        <h3>CODE</h3>
        <div id="code-scroll"></div>
      </div>
      <div id="vars-panel"></div>
      <div id="queue-panel">
        <h3>BFS QUEUE</h3>
        <div id="queue-items"><span class="q-empty">(empty)</span></div>
      </div>
    </div>

  </div>

  <div id="controls">
    <button id="btn-reset">⟳ Reset</button>
    <button id="btn-prev">◀ Prev</button>
    <span id="step-label">—</span>
    <button id="btn-next">Next ▶</button>
    <select id="example-select"></select>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
